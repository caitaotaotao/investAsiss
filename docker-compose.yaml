# ~/quantWorld/investAssis/docker-compose.yaml

services:
  openclaw:
    image: dr34m/openclaw:latest  # 国内镜像源
    container_name: invest-agent-claw
    ports:
      - "18789:18789"  # ⭐ 新增：OpenClaw 默认的 Web UI 端口
      - "3000:3000"    # 如果你有自定义的UI运行在3000可以保留
      - "8000:8000"    # 如果有自定义API运行在8000可以保留
    volumes:
      - ~/quantWorld/investAssis:/app/custom
      - ~/quantWorld/investAssis/.openclaw-config:/home/node/.openclaw
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - BOCHA_API_KEY=${BOCHA_API_KEY}
      - VIRTUAL_ENV=/app/custom/.venv-container   # docker中的py运行环境挂载至主机模块
      - PATH=/app/custom/.venv-container/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin  # docker中的py运行环境挂载至主机模块
      # 强制监听 0.0.0.0
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_HOST=0.0.0.0
      - OPENCLAW_BROWSER_HOST=0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped